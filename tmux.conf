# rodjenkins/tmux_conf — muscle memory from the 2014 Thoughtbot-style setup
# Install: ln -sf ~/tmux_conf/tmux.conf ~/.tmux.conf  (or ./install.sh)

# ---------------------------------------------------------------------------
# Terminal
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"

# ---------------------------------------------------------------------------
# Prefix: act like GNU screen
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
# C-a C-a → last pane (screen "other")
bind-key C-a last-pane
# Send a literal C-a to the pane (e.g. bash beginning-of-line)
bind a send-prefix

# ---------------------------------------------------------------------------
# Act like vim
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# Copy-mode (tmux 2.4+): v to begin selection, y to copy
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# OSC 52 → outer terminal clipboard (only if the client allows it; many block this).
set -g set-clipboard on
set -as terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'
# tmux 3.2+ also:
# set -as terminal-features '*:clipboard'

# ---------------------------------------------------------------------------
# Windows / panes
# ---------------------------------------------------------------------------
# Start numbering at 1 (matches keyboard)
set -g base-index 1
setw -g pane-base-index 1
# Renumber after closing a window
set -g renumber-windows on

# Easier split mnemonics (keep default " and % too)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Status / history
# ---------------------------------------------------------------------------
# Minimal status (uncomment bg/fg if you want a softer bar)
# set -g status-style bg='#666666',fg='#aaaaaa'
set -g status-left ""
set -g status-right ""

set -g history-limit 10000

# Reduce escape delay for vim-ish tools
set -s escape-time 0

# Mouse: scroll + pane focus. Drag-select uses tmux copy-mode (not the terminal's
# native select). Workarounds:
#   • Shift+drag  — terminal-native select/copy (most clients)
#   • C-a m       — toggle mouse off/on when you want plain select
#   • mouse drag  — copies into tmux + OSC 52 clipboard when supported
set -g mouse on
bind m set -g mouse \; display-message "mouse #{?mouse,on,off}"

# Mouse drag end → copy and exit copy-mode (pairs with set-clipboard)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Reload this file
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
